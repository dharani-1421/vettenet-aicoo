<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>VetteNet - Powered by Aicoo</title>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans antialiased p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        
        <!-- Header Header Banner -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center border-b border-slate-800 pb-6 mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400">🤖 VetteNet Dashboard</h1>
                <p class="text-slate-400 text-sm mt-1">Cross-Boundary Agent Network & Secure Context Protocol</p>
            </div>
            <div class="flex items-center gap-2 bg-indigo-950/50 border border-indigo-500/30 px-4 py-2 rounded-xl">
                <span class="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse"></span>
                <span class="text-xs font-mono font-semibold tracking-wider uppercase text-indigo-300">Aicoo Infra Live</span>
            </div>
        </header>

        <!-- Dashboard Split Screen Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- Left Panel: Form Input Configurations -->
            <div class="lg:col-span-5 bg-slate-800/60 border border-slate-700/50 rounded-2xl p-6 shadow-xl backdrop-blur-sm">
                <h2 class="text-lg font-bold text-indigo-400 mb-5 flex items-center gap-2">
                    <span>⚡</span> 1. Client Agent Payload Request
                </h2>
                
                <div class="space-y-5">
                    <div>
                        <label class="block text-xs font-bold uppercase text-slate-400 tracking-widest mb-2">Target Skills Required</label>
                        <input id="skillsInput" type="text" value="React, AI Agents, Node.js" class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500 transition font-mono">
                        <p class="text-slate-500 text-[11px] mt-1">Provide skills separated by a comma</p>
                    </div>

                    <div>
                        <label class="block text-xs font-bold uppercase text-slate-400 tracking-widest mb-2">Max Project Budget ($/hr)</label>
                        <input id="budgetInput" type="number" value="65" class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500 transition font-mono">
                    </div>

                    <button onclick="runAicooSession()" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 active:scale-[0.99] py-3.5 rounded-xl font-bold tracking-wide transition shadow-lg shadow-indigo-950/50 mt-2">
                        Deploy Cross-Agent Query
                    </button>
                </div>
            </div>

            <!-- Right Panel: Dynamic Live Terminal Output -->
            <div class="lg:col-span-7 flex flex-col bg-slate-950 border border-slate-800 rounded-2xl shadow-2xl overflow-hidden min-h-[380px]">
                <div class="bg-slate-900 border-b border-slate-800/80 px-4 py-3 flex items-center justify-between">
                    <span class="text-xs font-bold font-mono tracking-widest text-emerald-400 uppercase">Aicoo Network Trace Log</span>
                    <div class="flex gap-1.5">
                        <span class="w-3 h-3 rounded-full bg-slate-800"></span>
                        <span class="w-3 h-3 rounded-full bg-slate-800"></span>
                        <span class="w-3 h-3 rounded-full bg-slate-800"></span>
                    </div>
                </div>
                
                <div id="outputTrace" class="p-5 flex-1 font-mono text-xs leading-relaxed overflow-y-auto text-slate-400 space-y-2">
                    <p class="text-slate-600">// Standing by. Initialize a transaction payload to deploy isolated execution routing...</p>
                </div>
            </div>

        </div>

    </div>

    <!-- UI Execution Mechanics Script Engine -->
    <script>
        async function runAicooSession() {
            const trace = document.getElementById('outputTrace');
            
            // Clean interface slate and begin stream simulation trace logs
            trace.innerHTML = `
                <p class="text-yellow-400 font-bold animate-pulse">[INIT] Triggering structural network handshake...</p>
                <p class="text-slate-500">> Handshaking target proxy endpoint: aicoo.infra.network/v1/agent-to-agent</p>
            `;
            
            const rawSkills = document.getElementById('skillsInput').value;
            const skillsArr = rawSkills.split(',').map(item => item.trim()).filter(Boolean);
            const maxBudgetNum = parseInt(document.getElementById('budgetInput').value) || 0;

            try {
                // Network pipeline dispatch request execution logic
                const response = await fetch('/api/aicoo/coordinate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        clientAgentId: "agent_client_alpha_99",
                        projectRequirements: { skills: skillsArr },
                        budget: { hourlyMax: maxBudgetNum }
                    })
                });

                if (!response.ok) throw new Error("Infrastructure execution dropped.");
                const data = await response.json();

                // Append runtime tracing metrics instantly
                setTimeout(() => {
                    trace.innerHTML += `
                        <p class="text-blue-400">[SECURE] Isolated Context Cell established. No raw datasets leaked.</p>
                        <p class="text-purple-400">[LOG] Metadata footprint compiled at ${data.aicooTraceLog.timestamp}</p>
                        <div class="mt-4 p-4 rounded-xl border ${data.connectionStatus === 'AUTHORIZED' ? 'bg-emerald-950/30 border-emerald-500/20 text-emerald-300' : 'bg-rose-950/30 border-rose-500/20 text-rose-300'}">
                            <p class="font-bold text-sm mb-1">Status: ${data.connectionStatus}</p>
                            <p class="font-bold mb-2">Computed Fitment Accuracy: ${data.matchPercentage}%</p>
                            <p class="text-xs text-slate-300 italic">"${data.payload.message}"</p>
                            \${data.payload.availability ? \`<p class="text-xs mt-2 text-indigo-300"><b>Synced Availability:</b> \${data.payload.availability}</p>\` : ''}
                        </div>
                    `;
                }, 600);

            } catch (err) {
                trace.innerHTML += `<p class="text-rose-500 font-bold mt-2">[CRITICAL RUNTIME ERROR] ${err.message}</p>`;
            }
        }
    </script>
</body>
</html>
